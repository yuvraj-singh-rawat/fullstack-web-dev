<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links</title>
  </head>
  <body>
    <h1>Hello World</h1>

    <!-- url -->
    <img
      src="https://images.pexels.com/photos/6405694/pexels-photo-6405694.jpeg"
      alt="Sample Photo"
      width="auto"
      height="200"
    />

    <hr />
    <!-- source file -->
    <a href="https://www.google.com">
      <img src="sample.jpeg" alt="sample image" width="auto" height="200" />
    </a>

    <hr />

    <!-- Link to an Email Address -->

    <a href="mailto:yuvrajsingh@gmail.com">Send Mail</a>

    <br />

    <!-- Button as a Link -->

    <button onclick="document.location = 'https://www.google.com'">
      Click Here
    </button>

    <br />

    <!-- Links -->
    <a href="https://google.co.in" target="_top">Click Here [New Page]</a>
    <br />
    <a href="https://google.com" target="_parent">Click Here [Same Page]</a>
    <br />
  </body>
</html>

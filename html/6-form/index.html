<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="index.html">
      <label for="name">Name: <input type="text" placeholder="Enter your name" required /></label> <br>
      <label for="email">Email: <input type="email" placeholder="Enter your email" required /></label> <br>
      <label for="password">Password: <input type="password" placeholder="Enter your password" required /></label> <br>
      <label for="dob">Date of Birth: <input type="date" placeholder="Enter your d.o.b." required></label>

      <br /><br />

      <label for="sex">Sex:</label>
      <input type="radio" name="gender" value="Male" id="sex"/> Male
      <input type="radio" name="gender" value="Female" id="sex" /> Female

      <br /><br />

      <label for="skills">Skills:</label>
      <input type="checkbox" /> React <input type="checkbox" /> Next.Js
      <input type="checkbox" /> MongoDB

      <br /><br />

      <label for="about">Tell Me About Yourself:</label>
      <br />
      <textarea rows="4" cols="20">Type here</textarea>

      <br /><br />

      <label for="location">Location:</label>
      <select>
        <option>on-Site</option>
        <option>Remote</option>
        <option>Hybrid</option>
      </select>

      <br />
      <br />

      <input type="submit" />
    </form>
  </body>
</html>

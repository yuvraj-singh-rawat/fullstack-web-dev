<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio & Video</title>
  </head>
  <body>
    <h2>Local Video Player</h2>
    <!-- offline player-->
    <video width="500" controls autoplay muted>
      <source src="vid.mp4" type="video/mp4" />
    </video>

    <hr />

    <h2>Online Video Player</h2>
    <!-- iFrame Player  -->
    <iframe
      width="500"
      height="315"
      src="https://www.youtube.com/embed/3QLrDwctCxk?si=cBokOM0No8u9xExc"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture; 
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <hr />

    <h2>Audio Player</h2>
    <audio controls>
      <source src="sample.mp3" type="audio/mpeg" />
    </audio>
  </body>
</html>
